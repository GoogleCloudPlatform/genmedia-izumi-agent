<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Timeline Viewer</title>
    <link rel="stylesheet" href="video_timeline_viewer.css">
</head>
<body>
    <h1>Video Timeline Viewer</h1>

    <div class="container">
        <h2 id="canvasTitle"></h2>
        <div class="controls">
            <label class="switch">
                <input type="checkbox" id="viewToggle">
                <span class="slider round"></span>
            </label>
            <span id="toggleLabel">View: Images</span>
        </div>
        <div id="timeline-container"></div>
    </div>

    <script src="video_timeline_viewer.js"></script>
</body>
</html>
