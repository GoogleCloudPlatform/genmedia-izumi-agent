# Co-Director Configuration

# --- Global Optimization (MAB) ---
mab:
  algorithm: ucb
  warm_up: true
  num_iterations: 4
  algorithm_params:
    epsilon_greedy:
      epsilon: 0.1
    ucb:
      c: 50.0

  # --- Creative Arms ---
  arms:
    creative_strategy:
      - informational
      - transformational
      - comparative
    narrative_mode:
      - analytical
      - vignette
      - narrative_drama
    aesthetic_archetype:
      - clarity_energy
      - cinematic_premium
      - minimalist_focus
      - kinetic_grit

# --- Local Optimization (Self-Refinement) ---
self_refinement:
  storyline:
    max_attempts: 2
    score_threshold: 90
  keyframe:
    max_attempts: 2
    score_threshold: 90

# --- Reporting ---
generate_html_report: true
generate_canvas_report: true

# --- Production ---
#logo_scene_mode: default # options: default, r2v
logo_scene_mode: r2v